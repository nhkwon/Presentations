<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .font { font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; }
      .serif { font-family: "Times New Roman", Georgia, serif; }
      .seoulblue { fill: #00205b; }
      .blue { fill: #005bac; }
      .cyan { fill: #00a3e0; }
      .red { fill: #b01e2e; }
      .dark { fill: #222222; }
      .muted { fill: #666666; }
      .line-blue { stroke: #00205b; }
      .line-gray { stroke: #b7b7b7; }
      .small { font-size: 25px; }
      .body { font-size: 29px; }
      .body-bold { font-size: 30px; font-weight: 700; }
      .label { font-size: 22px; font-weight: 700; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
    <linearGradient id="photoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#d8e4ef"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="#ffffff"/>

  <!-- Top English slogan -->
  <text x="58" y="72" class="serif dark" font-size="50" font-weight="700" font-style="italic">
    <tspan>With </tspan><tspan class="red" font-size="72">C</tspan><tspan>reativity, </tspan>
    <tspan class="blue" font-size="72">P</tspan><tspan>racticality, and </tspan>
    <tspan class="seoulblue" font-size="72">E</tspan><tspan>thics</tspan>
  </text>

  <!-- Central statement -->
  <g class="font" filter="url(#softShadow)">
    <text x="960" y="130" text-anchor="middle" class="dark" font-size="30" font-weight="700">
      <tspan>Based on SeoulTech's motto of </tspan>
      <tspan class="red">Sincerity, Creativity, and Cooperation</tspan><tspan>,</tspan>
    </text>
    <text x="960" y="170" text-anchor="middle" class="dark" font-size="30" font-weight="700">
      <tspan>cultivating </tspan><tspan class="blue">field-ready smart construction professionals</tspan>
    </text>
  </g>

  <!-- Top connector arrows -->
  <path d="M356 116 H178 V188" fill="none" class="line-blue" stroke-width="3"/>
  <polygon points="178,197 170,181 186,181" fill="#00205b"/>
  <path d="M1558 116 H1740 V188" fill="none" class="line-blue" stroke-width="3"/>
  <polygon points="1740,197 1732,181 1748,181" fill="#00205b"/>

  <!-- Left bracket box -->
  <g>
    <path d="M42 262 V204 H337" fill="none" class="line-gray" stroke-width="6"/>
    <path d="M337 204 V262" fill="none" class="line-gray" stroke-width="4" stroke-dasharray="4 4"/>
    <path d="M42 494 V554 H337 V494" fill="none" class="line-gray" stroke-width="6"/>
    <path d="M42 262 V494" fill="none" class="line-gray" stroke-width="3" stroke-dasharray="4 4"/>
    <text x="190" y="316" text-anchor="middle" class="font seoulblue" font-size="27" font-weight="700">Creative·Ethical</text>
    <text x="190" y="367" text-anchor="middle" class="font seoulblue" font-size="27" font-weight="700">&amp; Practical</text>
    <text x="190" y="422" text-anchor="middle" class="font seoulblue" font-size="29" font-weight="700">Smart Construction</text>
    <text x="190" y="477" text-anchor="middle" class="font seoulblue" font-size="29" font-weight="700">Professionals</text>
  </g>

  <!-- Right bracket box -->
  <g>
    <path d="M1606 262 V204 H1882" fill="none" class="line-gray" stroke-width="6"/>
    <path d="M1882 204 V262" fill="none" class="line-gray" stroke-width="4" stroke-dasharray="4 4"/>
    <path d="M1606 494 V554 H1882 V494" fill="none" class="line-gray" stroke-width="6"/>
    <path d="M1606 262 V494" fill="none" class="line-gray" stroke-width="3" stroke-dasharray="4 4"/>
    <text x="1744" y="335" text-anchor="middle" class="font seoulblue" font-size="28" font-weight="700">Safe and Sustainable</text>
    <text x="1744" y="395" text-anchor="middle" class="font seoulblue" font-size="28" font-weight="700">Built Environments</text>
    <text x="1744" y="455" text-anchor="middle" class="font seoulblue" font-size="28" font-weight="700">for Future Society</text>
  </g>

  <!-- Central relationship diagram -->
  <g>
    <path d="M945 228 A178 178 0 0 1 945 584" fill="none" stroke="#005bac" stroke-width="70"/>
    <path d="M925 584 A178 178 0 0 1 925 228" fill="none" stroke="#a9a9a9" stroke-width="70"/>
    <circle cx="935" cy="406" r="150" fill="#ffffff" stroke="#eef2f5" stroke-width="2"/>
    <circle cx="935" cy="406" r="123" fill="#f8fbfd" stroke="#e1e8ef" stroke-width="1"/>

    <text x="935" y="374" text-anchor="middle" class="font dark" font-size="56" font-weight="800">EPiC</text>
    <text x="935" y="414" text-anchor="middle" class="font blue" font-size="21" font-weight="700">Creative·Practical</text>
    <text x="935" y="443" text-anchor="middle" class="font blue" font-size="21" font-weight="700">Ethical</text>
    <text x="798" y="402" text-anchor="middle" class="font" font-size="29" font-weight="800" fill="#ffffff" transform="rotate(-90 798 402)">Talent</text>
    <text x="1071" y="402" text-anchor="middle" class="font" font-size="26" font-weight="800" fill="#ffffff" transform="rotate(90 1071 402)">Competency</text>

    <g stroke="#8ea7bb" stroke-width="5" fill="none" opacity="0.55">
      <line x1="858" y1="312" x2="1012" y2="500"/>
      <line x1="1012" y1="312" x2="858" y2="500"/>
      <line x1="840" y1="406" x2="1030" y2="406"/>
    </g>
    <circle cx="940" cy="464" r="24" fill="#466372" opacity="0.88"/>
    <path d="M902 520 V497 C902 477 918 462 940 462 C962 462 978 477 978 497 V520 Z" fill="#466372" opacity="0.88"/>
  </g>

  <!-- Left talent list -->
  <g class="font">
    <text x="570" y="258" text-anchor="end" class="dark body-bold">Creative Talent</text>
    <text x="570" y="292" text-anchor="end" class="muted" font-size="23">AI·BIM-based</text>
    <text x="570" y="321" text-anchor="end" class="muted" font-size="23">integrative solutions</text>
    <circle cx="650" cy="260" r="54" fill="#ffffff" stroke="#a9a9a9" stroke-width="5"/>
    <text x="650" y="277" text-anchor="middle" class="red" font-size="48" font-weight="800">創</text>

    <text x="570" y="402" text-anchor="end" class="dark body-bold">Ethical Talent</text>
    <text x="570" y="436" text-anchor="end" class="muted" font-size="23">safety &amp; public value</text>
    <text x="570" y="465" text-anchor="end" class="muted" font-size="23">in built environments</text>
    <circle cx="650" cy="404" r="54" fill="#ffffff" stroke="#a9a9a9" stroke-width="5"/>
    <text x="650" y="421" text-anchor="middle" class="red" font-size="48" font-weight="800">倫</text>

    <text x="570" y="546" text-anchor="end" class="dark body-bold">Practical Talent</text>
    <text x="570" y="580" text-anchor="end" class="muted" font-size="23">field-oriented</text>
    <text x="570" y="609" text-anchor="end" class="muted" font-size="23">project execution</text>
    <circle cx="650" cy="548" r="54" fill="#ffffff" stroke="#a9a9a9" stroke-width="5"/>
    <text x="650" y="565" text-anchor="middle" class="red" font-size="48" font-weight="800">實</text>
  </g>

  <!-- Right competency list -->
  <g class="font">
    <circle cx="1142" cy="210" r="38" fill="#ffffff" stroke="#00205b" stroke-width="4"/>
    <text x="1142" y="224" text-anchor="middle" class="dark" font-size="36" font-weight="700">人</text>
    <text x="1192" y="205" class="blue body-bold">Humanistic Judgment</text>
    <text x="1192" y="238" class="muted small">[Humanities+]</text>

    <circle cx="1210" cy="292" r="38" fill="#ffffff" stroke="#00205b" stroke-width="4"/>
    <text x="1210" y="306" text-anchor="middle" class="dark" font-size="36" font-weight="700">通</text>
    <text x="1260" y="287" class="blue body-bold">Communication Skills</text>
    <text x="1260" y="320" class="muted small">[Communication+]</text>

    <circle cx="1235" cy="374" r="38" fill="#ffffff" stroke="#00205b" stroke-width="4"/>
    <text x="1235" y="388" text-anchor="middle" class="dark" font-size="36" font-weight="700">學</text>
    <text x="1285" y="369" class="blue body-bold">Discipline-Based Expertise</text>
    <text x="1285" y="402" class="muted small">[Academic+]</text>

    <circle cx="1210" cy="456" r="38" fill="#ffffff" stroke="#00205b" stroke-width="4"/>
    <text x="1210" y="470" text-anchor="middle" class="dark" font-size="36" font-weight="700">世</text>
    <text x="1260" y="451" class="blue body-bold">Global Field Readiness</text>
    <text x="1260" y="484" class="muted small">[Global+]</text>

    <circle cx="1142" cy="538" r="38" fill="#ffffff" stroke="#00205b" stroke-width="4"/>
    <text x="1142" y="552" text-anchor="middle" class="dark" font-size="36" font-weight="700">創</text>
    <text x="1192" y="533" class="blue body-bold">Creative Problem Solving</text>
    <text x="1192" y="566" class="muted small">[Creativity+]</text>

    <circle cx="1210" cy="620" r="38" fill="#ffffff" stroke="#00205b" stroke-width="4"/>
    <text x="1210" y="634" text-anchor="middle" class="dark" font-size="36" font-weight="700">融</text>
    <text x="1260" y="615" class="blue body-bold">AI·BIM·Digital Twin Convergence</text>
    <text x="1260" y="648" class="muted small">[Convergence+]</text>
  </g>

  <!-- Bottom collaboration area -->
  <text x="70" y="725" class="font dark" font-size="50">Collaborating with faculty members at SeoulTech.</text>
  <rect x="0" y="753" width="1920" height="298" rx="12" fill="#fbfdff" stroke="#80b3d4" stroke-width="4"/>

  <g class="font">
    <g transform="translate(305 775)">
      <rect x="0" y="0" width="210" height="210" fill="url(#photoGrad)" stroke="#e8eef5"/>
      <circle cx="105" cy="82" r="42" fill="#91a9bb"/>
      <path d="M43 188 C50 135 160 135 167 188 Z" fill="#6f8798"/>
      <rect x="-8" y="219" width="226" height="42" rx="18" fill="#f5f5f5" stroke="#d0d0d0" filter="url(#softShadow)"/>
      <text x="105" y="247" text-anchor="middle" class="dark label">Architecture</text>
    </g>
    <g transform="translate(592 775)">
      <rect x="0" y="0" width="210" height="210" fill="url(#photoGrad)" stroke="#e8eef5"/>
      <circle cx="105" cy="82" r="42" fill="#91a9bb"/>
      <path d="M43 188 C50 135 160 135 167 188 Z" fill="#6f8798"/>
      <rect x="-8" y="219" width="226" height="42" rx="18" fill="#f5f5f5" stroke="#d0d0d0" filter="url(#softShadow)"/>
      <text x="105" y="247" text-anchor="middle" class="dark label">Civil Engineering</text>
    </g>
    <g transform="translate(879 775)">
      <rect x="0" y="0" width="210" height="210" fill="url(#photoGrad)" stroke="#e8eef5"/>
      <circle cx="105" cy="82" r="42" fill="#91a9bb"/>
      <path d="M43 188 C50 135 160 135 167 188 Z" fill="#6f8798"/>
      <rect x="-8" y="219" width="226" height="42" rx="18" fill="#f5f5f5" stroke="#d0d0d0" filter="url(#softShadow)"/>
      <text x="105" y="247" text-anchor="middle" class="dark label">Safety Engineering</text>
    </g>
    <g transform="translate(1166 775)">
      <rect x="0" y="0" width="210" height="210" fill="url(#photoGrad)" stroke="#e8eef5"/>
      <circle cx="105" cy="82" r="42" fill="#91a9bb"/>
      <path d="M43 188 C50 135 160 135 167 188 Z" fill="#6f8798"/>
      <rect x="-8" y="219" width="226" height="42" rx="18" fill="#f5f5f5" stroke="#d0d0d0" filter="url(#softShadow)"/>
      <text x="105" y="247" text-anchor="middle" class="dark label">Applied AI</text>
    </g>
    <g transform="translate(1453 775)">
      <rect x="0" y="0" width="210" height="210" fill="url(#photoGrad)" stroke="#e8eef5"/>
      <circle cx="105" cy="82" r="42" fill="#91a9bb"/>
      <path d="M43 188 C50 135 160 135 167 188 Z" fill="#6f8798"/>
      <rect x="-8" y="219" width="226" height="42" rx="18" fill="#f5f5f5" stroke="#d0d0d0" filter="url(#softShadow)"/>
      <text x="105" y="247" text-anchor="middle" class="dark label">Industry Collaboration</text>
    </g>
  </g>
</svg>
